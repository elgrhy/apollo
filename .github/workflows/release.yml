name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (native)
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: mars-macos-arm64

          # macOS Intel — cross-compiled from arm64 runner
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: mars-macos-x86_64

          # Linux x86_64 (static musl — works on any Linux distro, Docker, etc.)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: mars-linux-x86_64

          # Linux ARM64 (Raspberry Pi, servers, Android Termux)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: mars-linux-arm64

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: mars-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install musl cross tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/mars ${{ matrix.asset }}
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\mars.exe" "${{ matrix.asset }}"
          $hash = (Get-FileHash "${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -Encoding ascii "${{ matrix.asset }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  publish:
    name: Publish to marsatlas
    needs: build
    runs-on: ubuntu-latest
    # Run even if some builds failed — publish whatever succeeded
    if: always() && needs.build.result != 'skipped'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Sync install.sh to marsatlas
        env:
          GH_TOKEN: ${{ secrets.MARSATLAS_PAT }}
        run: |
          # Clone marsatlas, update install.sh, push
          git config --global user.email "ci@devjsx.com"
          git config --global user.name "MARS CI"
          git clone https://x-access-token:${GH_TOKEN}@github.com/elgrhy/marsatlas.git marsatlas-repo
          cp install.sh marsatlas-repo/install.sh
          cd marsatlas-repo
          git add install.sh
          git diff --cached --quiet || git commit -m "Update install.sh for ${{ github.ref_name }}"
          git push

      - name: Create GitHub Release on marsatlas
        uses: softprops/action-gh-release@v2
        with:
          repository: elgrhy/marsatlas
          token: ${{ secrets.MARSATLAS_PAT }}
          tag_name: ${{ github.ref_name }}
          name: "MARS ${{ github.ref_name }}"
          body: |
            ## What's new in ${{ github.ref_name }}

            ### v3.2.0 — Cranberry + PicoClaw binary + OpenClaw test fixes
            - **Cranberry agent**: DEVJSX research & analysis agent — binary distributed via elgrhy/cranberry-dist (public, binary-only; source is private)
            - **PicoClaw fixed**: now downloads from sipeed/picoclaw (Go binary) instead of the wrong openclaw/picoclaw repo
            - **OpenClaw**: DEVJSX-hosted path fully tested (no Docker required); Docker detection test added
            - **4 agents in selection menu**: ATLAS, Cranberry, OpenClaw, PicoClaw

            ### Agent support matrix
            | Agent | Source | Deployment | MARS role |
            |---|---|---|---|
            | ATLAS | DEVJSX | In-process LLM | Genesis protocol → handover |
            | Cranberry | DEVJSX (elgrhy/cranberry-dist) | Local process (port 5100) | Download binary + spawn + health check |
            | OpenClaw | openclaw.ai | Docker / AWS Fargate / Hosted | Official installer + security hardening |
            | PicoClaw | sipeed/picoclaw | Local binary (port 18800) | Download binary + spawn + health check |

            ## Install / Upgrade

            ```bash
            curl -fsSL https://raw.githubusercontent.com/elgrhy/marsatlas/main/install.sh | bash
            ```

            **Existing users** — re-run the install command above to upgrade in-place automatically.

            Or download directly for your platform:

            | Platform | Binary |
            | --- | --- |
            | macOS Apple Silicon | `mars-macos-arm64` |
            | macOS Intel | `mars-macos-x86_64` |
            | Linux x86_64 | `mars-linux-x86_64` |
            | Linux ARM64 / Android Termux | `mars-linux-arm64` |
            | Windows x86_64 | `mars-windows-x86_64.exe` |

            Verify with the matching `.sha256` file.
          files: artifacts/**
