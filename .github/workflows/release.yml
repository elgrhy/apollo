name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (native)
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: apollo-macos-arm64

          # macOS Intel — cross-compiled from arm64 runner
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: apollo-macos-x86_64

          # Linux x86_64 (static musl — works on any Linux distro, Docker, etc.)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: apollo-linux-x86_64

          # Linux ARM64 (Raspberry Pi, servers, Android Termux)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: apollo-linux-arm64

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: apollo-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install musl cross tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/apollo ${{ matrix.asset }}
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\apollo.exe" "${{ matrix.asset }}"
          $hash = (Get-FileHash "${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -Encoding ascii "${{ matrix.asset }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'skipped'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Apollo ${{ github.ref_name }}"
          body: |
            ## Apollo ${{ github.ref_name }}

            ## Install / Upgrade

            ```bash
            curl -fsSL https://raw.githubusercontent.com/elgrhy/apollo/main/get.apollo.sh | bash
            ```

            **Existing users** — re-run the install command above to upgrade in-place automatically.

            Or download directly for your platform:

            | Platform | Binary |
            | --- | --- |
            | macOS Apple Silicon | `apollo-macos-arm64` |
            | macOS Intel | `apollo-macos-x86_64` |
            | Linux x86_64 | `apollo-linux-x86_64` |
            | Linux ARM64 / Android Termux | `apollo-linux-arm64` |
            | Windows x86_64 | `apollo-windows-x86_64.exe` |

            Verify with the matching `.sha256` file.
          files: artifacts/**
