name: openclaw
version: 1.0.0

runtime:
  type: python3
  entry: main.py

llm:
  required: true
  provider: any
  fallback: true

capabilities:
  - chat
  - tool-use
  - researcher

triggers:
  - api
  - webhook

resources:
  cpu: 0.5
  memory: 512mb
  timeout: 120

restart_policy:
  max_restarts: 3
  window_secs: 60

permissions:
  network: full
  filesystem: sandbox
  processes: restricted

compatibility:
  os: [linux, darwin]
  arch: [x86_64, aarch64]
